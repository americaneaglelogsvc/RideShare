steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/command-center:latest'
      - '--build-arg'
      - 'VITE_API_BASE_URL=${_VITE_API_BASE_URL}'
      - '.'
    dir: 'apps/admin-portal'

images:
  - 'gcr.io/$PROJECT_ID/command-center:latest'

substitutions:
  _VITE_API_BASE_URL: 'https://api.urwaydispatch.com'

options:
  logging: CLOUD_LOGGING_ONLY
