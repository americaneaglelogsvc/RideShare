<!-- Progressive Enhancement Styles -->
<style>
  .js-only { display: block !important; }
  .no-js-nav { display: none !important; }
  
  /* Fallback styles for no-JavaScript browsers */
  noscript .js-only { display: none !important; }
  noscript .no-js-nav { display: block !important; }
</style>

<!-- Universal Navigation Container (replace existing navigation with this) -->
<div id="global-navigation" class="js-only">
  <!-- Navigation will be dynamically rendered here -->
</div>

<!-- Progressive Enhancement Scripts -->
<script src="/templates/js/navigation-config.js"></script>
<script src="/templates/js/page-context.js"></script>
<script src="/templates/js/navigation-performance.js"></script>
<script src="/templates/js/navigation-renderer.js"></script>

<script>
  // Initialize navigation when DOM is ready
  document.addEventListener('DOMContentLoaded', function() {
    const currentPath = window.PAGE_CONTEXT.normalizePathname(window.location.pathname);
    renderNavigation('global-navigation', currentPath);
    initializeMobileMenu();
  });
  
  // Handle client-side routing (if applicable)
  window.addEventListener('popstate', function() {
    const currentPath = window.PAGE_CONTEXT.normalizePathname(window.location.pathname);
    renderNavigation('global-navigation', currentPath);
  });
  
  // Handle navigation after dynamic content changes
  window.addEventListener('navigation-update', function() {
    const currentPath = window.PAGE_CONTEXT.normalizePathname(window.location.pathname);
    renderNavigation('global-navigation', currentPath);
  });
</script>
