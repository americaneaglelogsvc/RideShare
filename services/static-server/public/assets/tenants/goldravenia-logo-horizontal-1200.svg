<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="300" fill="#1A1A1A"/>
  
  <!-- Full Horizontal Logotype -->
  <g transform="translate(50, 60)">
    <!-- Intricate Winged Shield -->
    <g transform="translate(0, 0)">
      <!-- Shield Base with Sophisticated Gold -->
      <path d="M80 20 L80 120 Q80 160 120 180 Q160 160 160 120 L160 20 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="4"/>
      
      <!-- Left Wing -->
      <path d="M70 30 Q40 50 30 80 Q40 90 70 100 L70 30 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="3"/>
      
      <!-- Right Wing -->
      <path d="M170 30 Q200 50 210 80 Q200 90 170 100 L170 30 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="3"/>
      
      <!-- Eagle Head Left -->
      <g transform="translate(50, 50)">
        <circle cx="0" cy="0" r="16" fill="#E4CD96" stroke="#BA8E48" stroke-width="2"/>
        <path d="M-6 -4 Q0 -8 6 -4" fill="none" stroke="#BA8E48" stroke-width="2"/>
        <circle cx="-4" cy="-2" r="2" fill="#BA8E48"/>
        <circle cx="4" cy="-2" r="2" fill="#BA8E48"/>
        <path d="M-8 4 Q0 8 8 4" fill="none" stroke="#BA8E48" stroke-width="1"/>
      </g>
      
      <!-- Eagle Head Right -->
      <g transform="translate(190, 50)">
        <circle cx="0" cy="0" r="16" fill="#E4CD96" stroke="#BA8E48" stroke-width="2"/>
        <path d="M-6 -4 Q0 -8 6 -4" fill="none" stroke="#BA8E48" stroke-width="2"/>
        <circle cx="-4" cy="-2" r="2" fill="#BA8E48"/>
        <circle cx="4" cy="-2" r="2" fill="#BA8E48"/>
        <path d="M-8 4 Q0 8 8 4" fill="none" stroke="#BA8E48" stroke-width="1"/>
      </g>
      
      <!-- Interlocking GR Monogram -->
      <text x="120" y="110" font-family="serif" font-size="48" font-weight="bold" 
            text-anchor="middle" fill="#1A1A1A">GR</text>
    </g>
    
    <!-- Brand Name -->
    <text x="280" y="80" font-family="serif" font-size="72" font-weight="bold" 
          text-anchor="start" fill="#E4CD96">GOLDRAVENIA</text>
    
    <!-- Tagline -->
    <text x="280" y="120" font-family="sans-serif" font-size="24" 
          text-anchor="start" fill="#BA8E48" letter-spacing="2">PRIVATE CAR SERVICE</text>
  </g>
</svg>
