<svg width="600" height="150" viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="150" fill="#1A1A1A"/>
  
  <!-- Full Horizontal Logotype (600px) -->
  <g transform="translate(25, 30)">
    <!-- Intricate Winged Shield -->
    <g transform="translate(0, 0)">
      <!-- Shield Base with Sophisticated Gold -->
      <path d="M40 10 L40 60 Q40 80 60 90 Q80 80 80 60 L80 10 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="2"/>
      
      <!-- Left Wing -->
      <path d="M35 15 Q20 25 15 40 Q20 45 35 50 L35 15 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="1.5"/>
      
      <!-- Right Wing -->
      <path d="M85 15 Q100 25 105 40 Q100 45 85 50 L85 15 Z" 
            fill="#E4CD96" stroke="#BA8E48" stroke-width="1.5"/>
      
      <!-- Eagle Head Left -->
      <g transform="translate(25, 25)">
        <circle cx="0" cy="0" r="8" fill="#E4CD96" stroke="#BA8E48" stroke-width="1"/>
        <path d="M-3 -2 Q0 -4 3 -2" fill="none" stroke="#BA8E48" stroke-width="1"/>
        <circle cx="-2" cy="-1" r="1" fill="#BA8E48"/>
        <circle cx="2" cy="-1" r="1" fill="#BA8E48"/>
      </g>
      
      <!-- Eagle Head Right -->
      <g transform="translate(95, 25)">
        <circle cx="0" cy="0" r="8" fill="#E4CD96" stroke="#BA8E48" stroke-width="1"/>
        <path d="M-3 -2 Q0 -4 3 -2" fill="none" stroke="#BA8E48" stroke-width="1"/>
        <circle cx="-2" cy="-1" r="1" fill="#BA8E48"/>
        <circle cx="2" cy="-1" r="1" fill="#BA8E48"/>
      </g>
      
      <!-- Interlocking GR Monogram -->
      <text x="60" y="55" font-family="serif" font-size="24" font-weight="bold" 
            text-anchor="middle" fill="#1A1A1A">GR</text>
    </g>
    
    <!-- Brand Name -->
    <text x="140" y="40" font-family="serif" font-size="36" font-weight="bold" 
          text-anchor="start" fill="#E4CD96">GOLDRAVENIA</text>
    
    <!-- Tagline -->
    <text x="140" y="60" font-family="sans-serif" font-size="12" 
          text-anchor="start" fill="#BA8E48" letter-spacing="1">PRIVATE CAR SERVICE</text>
  </g>
</svg>
