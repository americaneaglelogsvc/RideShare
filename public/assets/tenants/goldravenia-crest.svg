<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Shield Base -->
  <path d="M40 10 L40 50 Q40 65 55 72 Q70 65 70 50 L70 10 Z" 
        fill="#C7A008" stroke="#C7A008" stroke-width="2"/>
  
  <!-- Left Wing with Eagle Head -->
  <g transform="translate(5, 20)">
    <path d="M0 15 Q-10 12 -15 18 Q-10 22 0 25 L0 15" 
          fill="#C7A008"/>
    <!-- Eagle Head Left -->
    <circle cx="-13" cy="18" r="2" fill="#1A1A1A"/>
    <path d="M-15 18 L-16 17 L-15 16" fill="#C7A008"/>
  </g>
  
  <!-- Right Wing with Eagle Head -->
  <g transform="translate(75, 20)">
    <path d="M0 15 Q10 12 15 18 Q10 22 0 25 L0 15" 
          fill="#C7A008"/>
    <!-- Eagle Head Right -->
    <circle cx="13" cy="18" r="2" fill="#1A1A1A"/>
    <path d="M15 18 L16 17 L15 16" fill="#C7A008"/>
  </g>
  
  <!-- Interlocking GR Monogram -->
  <g transform="translate(25, 25)">
    <!-- G -->
    <path d="M10 10 Q10 17 10 25 Q10 30 15 30 Q17 30 17 27 Q17 24 15 24 L12 24" 
          fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
    <!-- R -->
    <path d="M22 10 L22 30 M22 10 Q28 10 28 17 Q28 24 22 24 L22 24" 
          fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
    <path d="M22 24 Q25 24 26 27 Q27 30 25 30" 
          fill="#1A1A1A" stroke="#1A1A1A" stroke-width="1"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="40" cy="35" r="1.5" fill="#1A1A1A"/>
  <circle cx="40" cy="42" r="1.5" fill="#1A1A1A"/>
  <circle cx="40" cy="49" r="1.5" fill="#1A1A1A"/>
</svg>
