<svg width="600" height="136" viewBox="0 0 600 136" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="136" fill="#000000"/>
  
  <!-- Definitive GoldRavenia Logo from GolDarveniaFinalLogo.png -->
  <g transform="translate(50, 20)">
    <!-- Intricate Winged Shield - 136px Height Constraint -->
    <g transform="scale(1.2)">
      <!-- Shield Base with Authentic Bronze Gold -->
      <path d="M40 10 L40 60 Q40 80 60 90 Q80 80 80 60 L80 10 Z" 
            fill="#B69B60" stroke="#775B3A" stroke-width="3"/>
      
      <!-- Left Wing -->
      <path d="M35 15 Q20 25 15 40 Q20 45 35 50 L35 15 Z" 
            fill="#B69B60" stroke="#775B3A" stroke-width="2"/>
      
      <!-- Right Wing -->
      <path d="M85 15 Q100 25 105 40 Q100 45 85 50 L85 15 Z" 
            fill="#B69B60" stroke="#775B3A" stroke-width="2"/>
      
      <!-- Eagle Head Left -->
      <g transform="translate(25, 25)">
        <circle cx="0" cy="0" r="12" fill="#B69B60" stroke="#775B3A" stroke-width="2"/>
        <path d="M-6 -4 Q0 -8 6 -4" fill="none" stroke="#775B3A" stroke-width="2"/>
        <circle cx="-4" cy="-2" r="2" fill="#775B3A"/>
        <circle cx="4" cy="-2" r="2" fill="#775B3A"/>
        <path d="M-8 4 Q0 8 8 4" fill="none" stroke="#775B3A" stroke-width="1"/>
      </g>
      
      <!-- Eagle Head Right -->
      <g transform="translate(95, 25)">
        <circle cx="0" cy="0" r="12" fill="#B69B60" stroke="#775B3A" stroke-width="2"/>
        <path d="M-6 -4 Q0 -8 6 -4" fill="none" stroke="#775B3A" stroke-width="2"/>
        <circle cx="-4" cy="-2" r="2" fill="#775B3A"/>
        <circle cx="4" cy="-2" r="2" fill="#775B3A"/>
        <path d="M-8 4 Q0 8 8 4" fill="none" stroke="#775B3A" stroke-width="1"/>
      </g>
      
      <!-- Interlocking GR Monogram -->
      <text x="60" y="55" font-family="serif" font-size="32" font-weight="bold" 
            text-anchor="middle" fill="#000000">GR</text>
    </g>
  </g>
  
  <!-- Brand Name -->
  <text x="300" y="85" font-family="serif" font-size="42" font-weight="bold" 
        text-anchor="middle" fill="#B69B60">GoldRavenia</text>
  
  <!-- Tagline -->
  <text x="300" y="115" font-family="sans-serif" font-size="18" 
        text-anchor="middle" fill="#775B3A">Luxury Transportation</text>
</svg>
