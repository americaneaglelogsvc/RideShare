<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Marketing Dashboard - UWD</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .status.active { color: #10b981; }
        .status.inactive { color: #ef4444; }
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 20px; border-radius: 5px; color: white; z-index: 1000; }
        .notification.success { background: #10b981; }
        .notification.error { background: #ef4444; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; margin: 10px 0; }
        .campaign-table { width: 100%; border-collapse: collapse; }
        .campaign-table th, .campaign-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e5e7eb; }
        .campaign-table th { background: #f9fafb; font-weight: 600; }
        .btn-primary { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 5px; text-decoration: none; }
        .btn-secondary { background: #6b7280; color: white; padding: 8px 16px; border-radius: 5px; text-decoration: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; margin: 5% auto; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; }
    </style>
</head>
<body class="bg-gray-100">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="flex items-center">
                    <i class="fas fa-envelope text-blue-600 text-2xl mr-3"></i>
                    <h1 class="text-2xl font-bold text-gray-900">Email Marketing Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Tenant: <span id="tenant-name" class="font-medium">Goldravenia</span></span>
                    <button onclick="createNewCampaign()" class="btn-primary">
                        <i class="fas fa-plus mr-2"></i>Create Campaign
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Overview -->
        <section class="mb-8">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">Campaign Performance</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-90">Total Sent</p>
                            <p class="text-2xl font-bold" id="total-sent">0</p>
                        </div>
                        <i class="fas fa-paper-plane text-3xl opacity-50"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-90">Open Rate</p>
                            <p class="text-2xl font-bold" id="open-rate">0%</p>
                        </div>
                        <i class="fas fa-envelope-open text-3xl opacity-50"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-90">Click Rate</p>
                            <p class="text-2xl font-bold" id="click-rate">0%</p>
                        </div>
                        <i class="fas fa-mouse-pointer text-3xl opacity-50"></i>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-sm opacity-90">Conversion Rate</p>
                            <p class="text-2xl font-bold" id="conversion-rate">0%</p>
                        </div>
                        <i class="fas fa-chart-line text-3xl opacity-50"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Campaign List -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold text-gray-900">Email Campaigns</h2>
                <div class="flex items-center space-x-4">
                    <select id="campaign-filter" class="px-3 py-2 border border-gray-300 rounded-md" aria-label="Filter campaigns by type" title="Filter campaigns by type">
                        <option value="all">All Campaigns</option>
                        <option value="welcome">Welcome</option>
                        <option value="retention">Retention</option>
                        <option value="promotion">Promotion</option>
                        <option value="newsletter">Newsletter</option>
                    </select>
                    <button onclick="refreshCampaigns()" class="btn-secondary">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>
            </div>

            <div class="bg-white shadow rounded-lg overflow-hidden">
                <table class="campaign-table">
                    <thead>
                        <tr>
                            <th>Campaign Name</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Sent</th>
                            <th>Open Rate</th>
                            <th>Click Rate</th>
                            <th>Conversion</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="campaign-tbody">
                        <!-- Campaigns will be loaded here -->
                        <tr>
                            <td colspan="8" class="text-center py-8 text-gray-500">
                                <i class="fas fa-spinner fa-spin mr-2"></i>Loading campaigns...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Create Campaign Modal -->
    <div id="create-campaign-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">Create New Campaign</h3>
                <button onclick="closeModal('create-campaign-modal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <form id="create-campaign-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Campaign Name</label>
                    <input type="text" name="name" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Campaign Type</label>
                    <select name="campaign_type" required class="w-full px-3 py-2 border border-gray-300 rounded-md" aria-label="Select campaign type" title="Select campaign type">
                        <option value="">Select type</option>
                        <option value="welcome">Welcome</option>
                        <option value="retention">Retention</option>
                        <option value="promotion">Promotion</option>
                        <option value="newsletter">Newsletter</option>
                        <option value="booking_confirmation">Booking Confirmation</option>
                        <option value="driver_onboarding">Driver Onboarding</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                    <input type="text" name="subject_en" required class="w-full px-3 py-2 border border-gray-300 rounded-md">
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Content</label>
                    <textarea name="content_en" rows="6" required class="w-full px-3 py-2 border border-gray-300 rounded-md"></textarea>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Target Segment</label>
                    <select name="target_segment" class="w-full px-3 py-2 border border-gray-300 rounded-md" aria-label="Select target customer segment" title="Select target customer segment">
                        <option value="all_customers">All Customers</option>
                        <option value="new_customers">New Customers</option>
                        <option value="repeat_customers">Repeat Customers</option>
                        <option value="high_value">High Value Customers</option>
                        <option value="inactive">Inactive Customers</option>
                        <option value="corporate">Corporate Customers</option>
                    </select>
                </div>
                
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal('create-campaign-modal')" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Create Campaign</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Analytics Modal -->
    <div id="analytics-modal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold">Campaign Analytics</h3>
                <button onclick="closeModal('analytics-modal')" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div id="analytics-content">
                <!-- Analytics will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/templates/js/email-marketing-automation.js"></script>
    <script>
        // Additional UI functions
        function createNewCampaign() {
            document.getElementById('create-campaign-modal').style.display = 'block';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function refreshCampaigns() {
            if (window.emailCampaignManager) {
                window.emailCampaignManager.loadCampaigns();
                window.emailCampaignManager.loadAnalytics();
            }
        }

        // Handle create campaign form submission
        document.getElementById('create-campaign-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const campaignData = {
                name: formData.get('name'),
                campaign_type: formData.get('campaign_type'),
                subject_en: formData.get('subject_en'),
                content_en: formData.get('content_en'),
                target_segment: formData.get('target_segment')
            };

            try {
                await window.emailCampaignManager.createCampaign(campaignData);
                closeModal('create-campaign-modal');
                e.target.reset();
            } catch (error) {
                console.error('Error creating campaign:', error);
            }
        });

        // Close modals when clicking outside
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
    </script>
</body>
</html>
