name: Development Pipeline

on:
  push:
    branches: [develop, feature/*]
  pull_request:
    branches: [develop]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests (not recommended)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'
  PROJECT_ID: rideoo-dev-487904
  REGION: us-central1
  SERVICE_NAME: rideshare-gateway-dev

jobs:
  # Code Quality and Security
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: |
          cd services/gateway
          npm ci

      - name: Run linting
        run: |
          cd services/gateway
          npm run lint

      - name: Type checking
        run: |
          cd services/gateway
          npm run type-check

      - name: Security audit
        run: |
          cd services/gateway
          npm audit --audit-level moderate

  # Unit and Integration Tests
  test:
    runs-on: ubuntu-latest
    needs: quality-check
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: |
          cd services/gateway
          npm ci

      - name: Run unit tests
        run: |
          cd services/gateway
          npm run test

      - name: Run integration tests
        run: |
          cd services/gateway
          npm run test:integration

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./services/gateway/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  # Build and Deploy to Development
  deploy-dev:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: services/gateway/package-lock.json

      - name: Install dependencies
        run: |
          cd services/gateway
          npm ci

      - name: Build application
        run: |
          cd services/gateway
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.DEV_WIF_PROVIDER }}
          service_account: ${{ secrets.DEV_GCP_SA_EMAIL }}

      - name: Configure Docker to use gcloud as a credential helper
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          push: true
          tags: |
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest
            us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run (Development)
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances 2 \
            --min-instances 0 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300s \
            --set-env-vars NODE_ENV=development \
            --set-env-vars DEBUG=true \
            --set-env-vars AUTO_SHUTDOWN_ENABLED=true

      - name: Health check
        run: |
          DEV_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          
          echo "Development URL: $DEV_URL"
          
          # Wait for service to be ready
          for i in {1..30}; do
            if curl -f "$DEV_URL/health" > /dev/null 2>&1; then
              echo "Development health check passed"
              break
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done

  # Frontend Development Deployment
  deploy-frontends-dev:
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        app: [rider-app, driver-app, admin-portal]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: |
          cd apps/${{ matrix.app }}
          npm ci

      - name: Build application
        run: |
          cd apps/${{ matrix.app }}
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.DEV_API_URL }}

      - name: Deploy to Vercel (Development)
        uses: amondnet/vercel-action@v20
        with:
          working-directory: apps/${{ matrix.app }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.DEV_VERCEL_PROJECT_ID }}
          vercel-args: '--env NODE_ENV=development'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Development Environment Tests
  dev-tests:
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-frontends-dev]
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get service URLs
        id: urls
        run: |
          API_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Run development smoke tests
        run: |
          API_URL="${{ steps.urls.outputs.api_url }}"
          
          # Test basic functionality
          curl -f "$API_URL/health" || exit 1
          curl -f "$API_URL/health/ready" || exit 1
          curl -f "$API_URL/api/v1/health" || exit 1

      - name: Run development integration tests
        run: |
          cd services/gateway
          npm run test:e2e -- --baseUrl="${{ steps.urls.outputs.api_url }}"

  # Cost Optimization Check
  cost-check:
    runs-on: ubuntu-latest
    needs: dev-tests
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Check development costs
        run: |
          echo "Checking development environment costs..."
          
          # Get current month's costs (mock implementation)
          DEV_COSTS=$(gcloud billing budgets list --billing-account=${{ secrets.BILLING_ACCOUNT_ID }} --format='value(displayName)' | grep -i dev | wc -l)
          
          echo "Development services running: $DEV_COSTS"
          
          # Alert if costs are too high for development
          if [ "$DEV_COSTS" -gt 5 ]; then
            echo "::warning::Development environment has too many services running"
          fi

  # Notify Development Team
  notify-dev:
    runs-on: ubuntu-latest
    needs: [dev-tests, cost-check]
    if: always() && github.ref == 'refs/heads/develop'
    steps:
      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Development deployment completed for ${{ github.repository }}"
          channel: '#development'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.DEV_SLACK_WEBHOOK_URL }}
        if: always()

      - name: Create GitHub Release (for feature branches)
        if: startsWith(github.ref, 'refs/heads/feature/')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: dev-${{ github.sha }}
          release_name: Development Build ${{ github.sha }}
          draft: false
          prerelease: true
