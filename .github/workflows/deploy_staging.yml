name: deploy-staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE: rideshare-gateway
  REGISTRY: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/rideoo-repo

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP (OIDC/WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/gateway
          tags: |
            type=sha,prefix=staging-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-canary:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Render YAML
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image_tag }}
          # Extract the actual tag from the full image string if necessary, 
          # but our YAML expects the full path after /gateway:
          # Wait, our YAML has: us-central1-docker.pkg.dev/rideoo-487904/rideoo-repo/gateway:${TAG}
          # needs.build.outputs.image_tag is: us-central1-docker.pkg.dev/rideoo-487904/rideoo-repo/gateway:staging-67a307e
          # So we need to extract 'staging-67a307e'
          TAG_ONLY=$(echo ${{ needs.build.outputs.image_tag }} | cut -d':' -f2)
          export TAG=$TAG_ONLY
          envsubst < infra/gcp/cloud-run-gateway.yaml > infra/gcp/cloud-run-gateway.rendered.yaml

      - name: Deploy staging
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          metadata: infra/gcp/cloud-run-gateway.rendered.yaml
          region: ${{ env.REGION }}
          # image: ${{ needs.build.outputs.image_tag }} # Not needed when using rendered metadata

      - name: Route 100% traffic
        run: |
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --to-latest

      - name: Smoke test canary
        run: |
          CANARY_URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.traffic[0].url)')
          echo "Testing canary at: $CANARY_URL"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$CANARY_URL/health")
            if [ "$STATUS" != "200" ]; then
              echo "Health check failed (attempt $i): HTTP $STATUS"
              if [ "$i" -eq 3 ]; then
                echo "::error::Canary health check failed — rolling back"
                gcloud run services update-traffic ${{ env.SERVICE }} --region=${{ env.REGION }} --to-revisions=LATEST=100
                exit 1
              fi
              sleep 10
            else
              echo "Health check passed (attempt $i)"
              break
            fi
          done

  promote-canary:
    needs: deploy-canary
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Promote canary to 100%
        run: |
          gcloud run services update-traffic ${{ env.SERVICE }} \
            --region=${{ env.REGION }} \
            --to-tags=canary=100

      - name: Post-deploy verification
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE }} --region=${{ env.REGION }} --format='value(status.url)')
          echo "Verifying production traffic at: $SERVICE_URL"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
          echo "Health: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Post-promotion health check failed"
            exit 1
          fi
